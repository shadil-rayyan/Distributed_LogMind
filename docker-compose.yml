services:
  logmind-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logmind_engine_dev
    ports:
      - "8080:8080"
    volumes:
      - logmind_data:/app/data
    environment:
      - GO_ENV=development
      - PORT=8080
      - LOGMIND_DB_PATH=/app/data/logmind.db
      - GOMEMLIMIT=96MiB
      - ENABLE_SIMULATOR=true
    restart: always

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: logmind_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

  grafana:
    image: grafana/grafana:10.0.0
    container_name: logmind_grafana
    ports:
      - "3000:3000"
    volumes:
      - ./deployments/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./deployments/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./deployments/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: always

volumes:
  logmind_data:
    driver: local
